<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Stock Sync</title>

<style>
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --bg: #f5f5f3;
    --white: #ffffff;
    --text: #1a1a1a;
    --border: rgba(0,0,0,0.15);
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .login-box {
    background: var(--white);
    padding: 2rem;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    text-align: center;
  }

  .logo {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 1.5rem;
    color: var(--green);
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 14px;
  }

  input:focus {
    outline: none;
    border-color: var(--green);
  }

  button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background: var(--green);
    border: none;
    color: white;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
  }

  button:hover {
    background: var(--green-dark);
  }

  .error {
    color: red;
    font-size: 13px;
    margin-top: 8px;
    display: none;
  }
</style>
</head>

<body>

<div class="login-box">
  <div class="logo">Stock Sync 🔐</div>

  <input type="text" id="name" placeholder="Enter your email">
  <input type="password" id="password" placeholder="Enter password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Create Account</button>

  <div class="error" id="error">Invalid name or password</div>
</div>
<script type="module">

    // 🔥 Import Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    
    // 🔥 Your Config (already correct)
    const firebaseConfig = {
      apiKey: "AIzaSyA4q6xdvReoswKx5c6dqQbFYgm2NUoceks",
      authDomain: "stock-sync-23cc9.firebaseapp.com",
      projectId: "stock-sync-23cc9",
      storageBucket: "stock-sync-23cc9.firebasestorage.app",
      messagingSenderId: "952662923282",
      appId: "1:952662923282:web:13d91673ecb8ca0cf520cb"
    };
    
    // 🔥 Initialize
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    console.log("Firebase Connected ✅");
    
    // ✅ SIGNUP FUNCTION
    window.signup = function () {
      const email = document.getElementById("name").value;
      const password = document.getElementById("password").value;
    
      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          alert("Account Created ✅");
          console.log(userCredential.user);
        })
        .catch((error) => {
          alert(error.message);
        });
    };
    
    // ✅ LOGIN FUNCTION
    window.login = function () {
      const email = document.getElementById("name").value;
      const password = document.getElementById("password").value;
    
      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          alert("Login Successful ✅");
          window.location.href = "index.html";
        })
        .catch((error) => {
          alert(error.message);
        });
    };
    
    </script>
</body>
</html>
