<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – Stock Sync</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="dash-body">

<!-- NAV -->
<nav class="dash-nav">
  <a class="logo" href="index.html">
    <div class="logo-icon">SS</div>
    Stock Sync
  </a>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="dash-user-label" style="font-size:13px;color:var(--text-secondary)"></span>
    <button class="btn-primary" style="font-size:13px;padding:6px 14px" onclick="doLogout()">Logout</button>
  </div>
</nav>

<!-- MAIN -->
<main class="dash-main">

  <!-- GREETING -->
  <div class="dash-greeting" id="dash-greeting">Good morning 👋</div>
  <div class="dash-sub" id="dash-sub" style="margin-bottom:1.75rem"></div>

  <!-- STAT CARDS -->
  <div class="dash-stats" style="margin-bottom:2.5rem">
    <div class="dash-stat-card">
      <div class="dash-stat-icon" style="background:#EAF3DE">📦</div>
      <div class="dash-stat-info">
        <div class="dash-stat-val" id="stat-total" style="color:var(--text-primary)">0</div>
        <div class="dash-stat-label">Total items</div>
      </div>
    </div>
    <div class="dash-stat-card">
      <div class="dash-stat-icon" style="background:#FAEEDA">⚠️</div>
      <div class="dash-stat-info">
        <div class="dash-stat-val" id="stat-expiring" style="color:var(--amber)">0</div>
        <div class="dash-stat-label">Expiring soon</div>
      </div>
    </div>
    <div class="dash-stat-card">
      <div class="dash-stat-icon" style="background:#FCEBEB">📉</div>
      <div class="dash-stat-info">
        <div class="dash-stat-val" id="stat-low" style="color:var(--red)">0</div>
        <div class="dash-stat-label">Low stock</div>
      </div>
    </div>
    <div class="dash-stat-card">
      <div class="dash-stat-icon" style="background:#E6F1FB">💸</div>
      <div class="dash-stat-info">
        <div class="dash-stat-val" id="stat-spend" style="color:var(--green)">₹0</div>
        <div class="dash-stat-label">Total spent</div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="app-tabs">
    <button class="tab-btn active" onclick="showTab('inventory', this)">📦 Inventory</button>
    <button class="tab-btn" onclick="showTab('expenses', this)">💸 Expenses</button>
    <button class="tab-btn" onclick="showTab('alerts', this)">🔔 Alerts</button>
  </div>

  <!-- ── INVENTORY TAB ── -->
  <div id="tab-inventory">
    <div class="add-form">
      <div class="form-label">Add grocery item</div>
      <div class="form-row">
        <input id="item-name" type="text" placeholder="Item name (e.g. Milk)" />
        <input id="item-qty" type="number" placeholder="Qty" min="0.1" step="0.1" value="1" style="max-width:90px" />
        <select id="item-unit">
          <option value="kg">kg</option>
          <option value="g">g</option>
          <option value="l">litre</option>
          <option value="ml">ml</option>
          <option value="pack">packs</option>
          <option value="pcs">pieces</option>
        </select>
        <select id="item-cat">
          <option>Dairy</option>
          <option>Vegetables</option>
          <option>Grains</option>
          <option>Fruits</option>
          <option>Snacks</option>
          <option>Beverages</option>
          <option>Other</option>
        </select>
        <select id="item-status">
          <option value="fresh">🟢 Fresh</option>
          <option value="expiring">🟡 Expiring soon</option>
          <option value="low">🔴 Low stock</option>
        </select>
        <button class="btn-primary" onclick="addItem()">Add item</button>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
        <button class="btn-csv" onclick="downloadCSV()">⬇ Download CSV</button>
        <button class="btn-outline" style="font-size:12.5px;padding:6px 14px;color:var(--text-secondary)" onclick="clearAllData()">Reset all data</button>
      </div>
    </div>
    <div style="overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--bg-primary);">
      <table class="inventory-table">
        <thead>
          <tr>
            <th>Item</th>
            <th>Quantity</th>
            <th>Category</th>
            <th>Unit</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="inventory-body"></tbody>
      </table>
    </div>
  </div>

  <!-- ── EXPENSES TAB ── -->
  <div id="tab-expenses" style="display:none">
    <div class="summary-cards">
      <div class="summary-card">
        <div class="s-label">Total spent</div>
        <div class="s-val" id="total-spent">₹0</div>
      </div>
      <div class="summary-card">
        <div class="s-label">Per person</div>
        <div class="s-val" id="per-person">₹0</div>
      </div>
      <div class="summary-card">
        <div class="s-label">This week</div>
        <div class="s-val" id="this-week">₹0</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1.5rem;">
      <div class="add-form" style="margin-bottom:0">
        <div class="form-label">Log expense</div>
        <div class="form-row">
          <input id="exp-name" type="text" placeholder="Item / description" />
          <input id="exp-amount" type="number" placeholder="Amount (₹)" min="1" style="max-width:130px" />
          <select id="exp-member-sel">
            <option>Raj</option>
            <option>Gaurav</option>
            <option>Priya</option>
            <option>Other</option>
          </select>
          <button class="btn-primary" onclick="addExpense()">Add</button>
        </div>
      </div>
      <div class="add-form" style="margin-bottom:0">
        <div class="form-label">Member breakdown</div>
        <div id="member-breakdown" style="font-size:13px;color:var(--text-secondary)">No expenses yet.</div>
      </div>
    </div>

    <div class="expense-list" id="expense-list"></div>
  </div>

  <!-- ── ALERTS TAB ── -->
  <div id="tab-alerts" style="display:none">
    <div class="alert-list" id="alert-list"></div>
  </div>

</main>

<script type="module">
  import { logout } from './auth.js';
  import { getInventory, saveInventory, getExpenses, saveExpenses, clearAll } from './data.js';

  // ── AUTH GUARD ─────────────────────────────
  const user = localStorage.getItem("user");
  if (!user) { window.location.href = "login.html"; }

  document.getElementById('dash-user-label').textContent = user;

  const h = new Date().getHours();
  document.getElementById('dash-greeting').textContent =
    `${h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening'} 👋`;
  document.getElementById('dash-sub').textContent =
    `Welcome back, ${user}. Here's your household overview.`;

  window.doLogout = logout;

  // ── INVENTORY ──────────────────────────────
  let inventory = getInventory();
  let nextId    = inventory.length ? Math.max(...inventory.map(i => i.id)) + 1 : 1;

  window.addItem = function () {
    const name   = document.getElementById('item-name').value.trim();
    const qty    = parseFloat(document.getElementById('item-qty').value) || 1;
    const unit   = document.getElementById('item-unit').value;
    const cat    = document.getElementById('item-cat').value;
    const status = document.getElementById('item-status').value;

    if (!name) return showToast("Please enter an item name", "error");
    if (inventory.some(i => i.name.toLowerCase() === name.toLowerCase()))
      return showToast(`"${name}" is already in inventory`, "error");

    inventory.push({ id: nextId++, name, qty, unit, cat, status, addedAt: Date.now() });
    saveInventory(inventory);
    renderInventory(); renderAlerts(); updateStats();
    document.getElementById('item-name').value = '';
    document.getElementById('item-qty').value  = '1';
    showToast(`Added "${name}" ✓`);
  };

  window.removeItem = function (id) {
    const item = inventory.find(i => i.id === id);
    inventory = inventory.filter(i => i.id !== id);
    saveInventory(inventory);
    renderInventory(); renderAlerts(); updateStats();
    showToast(`Removed "${item?.name}"`, "warn");
  };

  window.updateStatus = function (id, val) {
    inventory = inventory.map(i => i.id === id ? { ...i, status: val } : i);
    saveInventory(inventory);
    renderInventory(); renderAlerts(); updateStats();
  };

  function renderInventory() {
    const el = document.getElementById('inventory-body');
    if (!el) return;
    if (!inventory.length) {
      el.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📦</div>No items yet — add your first grocery item above.</div></td></tr>`;
      return;
    }
    el.innerHTML = inventory.map(i => `
      <tr>
        <td style="font-weight:500">${esc(i.name)}</td>
        <td>${i.qty} ${i.unit}</td>
        <td><span style="font-size:12px;color:var(--text-secondary)">${i.cat}</span></td>
        <td>${i.unit}</td>
        <td>
          <select onchange="updateStatus(${i.id}, this.value)"
            style="border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;outline:none;padding:2px 4px;">
            <option value="fresh"    ${i.status==='fresh'    ?'selected':''}>🟢 Fresh</option>
            <option value="expiring" ${i.status==='expiring' ?'selected':''}>🟡 Expiring</option>
            <option value="low"      ${i.status==='low'      ?'selected':''}>🔴 Low Stock</option>
          </select>
        </td>
        <td><button class="btn-danger" onclick="removeItem(${i.id})">Remove</button></td>
      </tr>`).join('');
  }

  // ── EXPENSES ───────────────────────────────
  let expenses  = getExpenses();
  let nextExpId = expenses.length ? Math.max(...expenses.map(e => e.id)) + 1 : 1;

  window.addExpense = function () {
    const name   = document.getElementById('exp-name').value.trim();
    const amount = parseFloat(document.getElementById('exp-amount').value) || 0;
    const member = document.getElementById('exp-member-sel').value;

    if (!name)   return showToast("Enter a description", "error");
    if (!amount) return showToast("Enter a valid amount", "error");

    expenses.push({ id: nextExpId++, name, amount, member, date: Date.now() });
    saveExpenses(expenses);
    renderExpenses(); updateStats();
    document.getElementById('exp-name').value   = '';
    document.getElementById('exp-amount').value = '';
    showToast(`Logged ₹${amount} for "${name}" ✓`);
  };

  window.removeExpense = function (id) {
    expenses = expenses.filter(e => e.id !== id);
    saveExpenses(expenses);
    renderExpenses(); updateStats();
    showToast("Expense removed", "warn");
  };

  function renderExpenses() {
    const el = document.getElementById('expense-list');
    if (!el) return;

    const total     = expenses.reduce((s, e) => s + e.amount, 0);
    const members   = [...new Set(expenses.map(e => e.member))].length || 1;
    const weekAgo   = Date.now() - 7 * 24 * 60 * 60 * 1000;
    const weekTotal = expenses.filter(e => e.date > weekAgo).reduce((s, e) => s + e.amount, 0);

    document.getElementById('total-spent').textContent = '₹' + total.toLocaleString('en-IN');
    document.getElementById('per-person').textContent  = '₹' + Math.round(total / members).toLocaleString('en-IN');
    document.getElementById('this-week').textContent   = '₹' + weekTotal.toLocaleString('en-IN');

    const breakdown = {};
    expenses.forEach(e => { breakdown[e.member] = (breakdown[e.member] || 0) + e.amount; });
    const bEl = document.getElementById('member-breakdown');
    if (bEl) {
      const entries = Object.entries(breakdown);
      bEl.innerHTML = !entries.length
        ? '<span style="color:var(--text-tertiary)">No expenses yet.</span>'
        : entries.map(([m, amt]) => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="width:24px;height:24px;border-radius:50%;background:var(--green-light);color:var(--green-text);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;">${m[0]}</div>
              ${m}
            </div>
            <span style="font-weight:600;color:var(--green)">₹${amt.toLocaleString('en-IN')}</span>
          </div>`).join('');
    }

    el.innerHTML = !expenses.length
      ? `<div class="empty-state"><div class="empty-icon">💸</div>No expenses logged yet.</div>`
      : [...expenses].reverse().map(e => `
        <div class="expense-item">
          <div class="expense-left">
            <div class="expense-name">${esc(e.name)}</div>
            <div class="expense-meta">${e.member} · ${fmtDate(e.date)}</div>
          </div>
          <div class="expense-right">
            <div class="expense-amount">₹${e.amount.toLocaleString('en-IN')}</div>
            <button class="btn-danger" onclick="removeExpense(${e.id})">×</button>
          </div>
        </div>`).join('');
  }

  // ── ALERTS ─────────────────────────────────
  function renderAlerts() {
    const el = document.getElementById('alert-list');
    if (!el) return;
    const alerts = [
      ...inventory.filter(i => i.status==='expiring').map(i => ({ type:'red',   title:`⚠️ ${i.name} is expiring soon`, sub:`${i.qty} ${i.unit} · ${i.cat}` })),
      ...inventory.filter(i => i.status==='low').map(i =>      ({ type:'amber', title:`📉 ${i.name} is running low`,    sub:`Only ${i.qty} ${i.unit} remaining` })),
      ...inventory.filter(i => i.status==='fresh').map(i =>    ({ type:'green', title:`✓ ${i.name} is stocked`,        sub:`${i.qty} ${i.unit} · ${i.cat}` })),
    ];
    el.innerHTML = !alerts.length
      ? `<div class="empty-state"><div class="empty-icon">✅</div>No alerts — your inventory looks great!</div>`
      : alerts.map(a => `
        <div class="alert-item alert-${a.type}">
          <div class="alert-dot alert-dot-${a.type}"></div>
          <div><div class="alert-title">${a.title}</div><div class="alert-sub">${a.sub}</div></div>
        </div>`).join('');
  }

  // ── STATS ──────────────────────────────────
  function updateStats() {
    document.getElementById('stat-total').textContent    = inventory.length;
    document.getElementById('stat-expiring').textContent = inventory.filter(i => i.status==='expiring').length;
    document.getElementById('stat-low').textContent      = inventory.filter(i => i.status==='low').length;
    document.getElementById('stat-spend').textContent    = '₹' + expenses.reduce((s,e) => s+e.amount, 0).toLocaleString('en-IN');
  }

  // ── TABS ───────────────────────────────────
  window.showTab = function (tab, btn) {
    ['inventory','expenses','alerts'].forEach(t =>
      document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    if (tab === 'alerts')   renderAlerts();
    if (tab === 'expenses') renderExpenses();
  };

  // ── CSV ────────────────────────────────────
  window.downloadCSV = function () {
    if (!inventory.length) return showToast("No items to export", "warn");
    const csv = [['Name','Quantity','Unit','Category','Status'], ...inventory.map(i => [i.name,i.qty,i.unit,i.cat,i.status])].map(r => r.join(',')).join('\n');
    const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(new Blob([csv],{type:'text/csv'})), download:'stock-sync-inventory.csv' });
    a.click(); showToast("CSV downloaded ✓");
  };

  // ── CLEAR ──────────────────────────────────
  window.clearAllData = function () {
    if (!confirm("Reset all your data? This cannot be undone.")) return;
    clearAll(); inventory=[]; expenses=[]; nextId=1; nextExpId=1;
    renderInventory(); renderExpenses(); renderAlerts(); updateStats();
    showToast("All data cleared", "warn");
  };

  // ── TOAST ──────────────────────────────────
  function showToast(msg, type='success') {
    let c = document.getElementById('_tc');
    if (!c) { c=document.createElement('div'); c.id='_tc'; c.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;'; document.body.appendChild(c); }
    const col = {success:{bg:'#ecfdf5',border:'#86efac',text:'#065f46'},error:{bg:'#fef2f2',border:'#fca5a5',text:'#7f1d1d'},warn:{bg:'#fffbeb',border:'#fcd34d',text:'#78350f'}}[type];
    const t = document.createElement('div');
    t.style.cssText=`background:${col.bg};border:1px solid ${col.border};color:${col.text};padding:10px 16px;border-radius:10px;font-size:13.5px;font-weight:500;font-family:'DM Sans',sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.08);max-width:280px;`;
    t.textContent=msg; c.appendChild(t); setTimeout(()=>t.remove(),3000);
  }

  // ── HELPERS ────────────────────────────────
  function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
  function fmtDate(ts){ return ts ? new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : ''; }

  // ── INIT ───────────────────────────────────
  const openTab = sessionStorage.getItem('openTab');
  if (openTab) { sessionStorage.removeItem('openTab'); showTab(openTab, document.querySelector(`.tab-btn[onclick*="${openTab}"]`)); }
  else { renderInventory(); }
  updateStats();
</script>

</body>
</html>
