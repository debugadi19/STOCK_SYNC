<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – Stock Sync</title>
<link rel="stylesheet" href="style.css">
<style>
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); display: inline-block;
    animation: pulse 1.8s ease-in-out infinite;
    box-shadow: 0 0 0 3px rgba(24,160,110,0.2);
    margin-right: 6px; vertical-align: middle;
  }
  .user-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--green-light); border: 1px solid rgba(24,160,110,0.18);
    border-radius: 99px; padding: 4px 12px 4px 6px;
    font-size: 12.5px; font-weight: 600; color: var(--green-text);
  }
  .user-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg,var(--green),var(--green-dark));
    color: #fff; font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .tab-pane { animation: fadeInUp 0.22s ease both; }
  .table-wrap {
    overflow-x: auto; border: 1px solid var(--border);
    border-radius: var(--radius-lg); background: var(--bg-primary);
    box-shadow: var(--shadow-sm);
  }
  .exp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
  @media (max-width: 640px) { .exp-grid { grid-template-columns: 1fr; } }
  .action-bar { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .filter-bar input, .filter-bar select {
    padding: 7px 12px; border: 1px solid var(--border-md);
    border-radius: var(--radius-md); font-size: 13px; font-family: inherit;
    background: var(--bg-primary); color: var(--text-primary);
    outline: none; transition: all 0.18s;
  }
  .filter-bar input:focus, .filter-bar select:focus {
    border-color: var(--green); box-shadow: 0 0 0 3px rgba(24,160,110,0.12);
  }
  .storage-bar { font-size: 11.5px; color: var(--text-tertiary); margin-top: 6px; }
  #backup-file-input { display: none; }
  .backup-row {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 10px 14px; margin-top: 10px; font-size: 13px;
  }
  .backup-row span { color: var(--text-secondary); flex: 1; }
</style>
</head>
<body class="dash-body">

<nav class="dash-nav">
  <a class="logo" href="index.html">
    <div class="logo-icon">SS</div>
    Stock Sync
  </a>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="user-pill">
      <div class="user-avatar" id="user-initial">?</div>
      <span id="dash-user-label">—</span>
    </div>
    <button class="btn-outline" style="font-size:13px;padding:6px 14px" onclick="doLogout()">Logout</button>
  </div>
</nav>

<main class="dash-main">

  <div class="dash-greeting" id="dash-greeting">Good morning 👋</div>
  <div class="dash-sub" style="margin-bottom:1.75rem">
    <span class="live-dot"></span>Your pantry at a glance
  </div>

  <div class="dash-stats" style="margin-bottom:2.75rem">
    <div class="dash-stat-card">
      <div class="dash-stat-icon" style="background:#EAF3DE">📦</div>
      <div class="dash-stat-info">
        <div class="dash-stat-val" id="stat-total" style="color:var(--text-primary)">0</div>
        <div class="dash-stat-label">Total items</div>
      </div>
    </div>
    <div class="dash-stat-card">
      <div class="dash-stat-icon" style="background:#FAEEDA">⚠️</div>
      <div class="dash-stat-info">
        <div class="dash-stat-val" id="stat-expiring" style="color:var(--amber)">0</div>
        <div class="dash-stat-label">Expiring soon</div>
      </div>
    </div>
    <div class="dash-stat-card">
      <div class="dash-stat-icon" style="background:#FCEBEB">📉</div>
      <div class="dash-stat-info">
        <div class="dash-stat-val" id="stat-low" style="color:var(--red)">0</div>
        <div class="dash-stat-label">Low stock</div>
      </div>
    </div>
    <div class="dash-stat-card">
      <div class="dash-stat-icon" style="background:#E6F1FB">💸</div>
      <div class="dash-stat-info">
        <div class="dash-stat-val" id="stat-spend" style="color:var(--green)">₹0</div>
        <div class="dash-stat-label">Total spent</div>
      </div>
    </div>
  </div>

  <div class="app-tabs">
    <button class="tab-btn active" onclick="showTab('inventory', this)">📦 Inventory</button>
    <button class="tab-btn" onclick="showTab('expenses', this)">💸 Expenses</button>
    <button class="tab-btn" onclick="showTab('alerts', this)">🔔 Alerts</button>
  </div>

  <!-- INVENTORY TAB -->
  <div id="tab-inventory" class="tab-pane">
    <div class="add-form">
      <div class="form-label">➕ Add grocery item</div>
      <div class="form-row">
        <input id="item-name" type="text" placeholder="Item name (e.g. Milk)" />
        <input id="item-qty"  type="number" placeholder="Qty" min="0.1" step="0.1" value="1" style="max-width:90px" />
        <select id="item-unit">
          <option value="kg">kg</option><option value="g">g</option>
          <option value="l">litre</option><option value="ml">ml</option>
          <option value="pack">packs</option><option value="pcs">pieces</option>
        </select>
        <select id="item-cat">
          <option>Dairy</option><option>Vegetables</option><option>Grains</option>
          <option>Fruits</option><option>Snacks</option><option>Beverages</option><option>Other</option>
        </select>
        <select id="item-status">
          <option value="fresh">🟢 Fresh</option>
          <option value="expiring">🟡 Expiring soon</option>
          <option value="low">🔴 Low stock</option>
        </select>
        <button class="btn-primary" onclick="addItem()">Add item</button>
      </div>
      <div class="action-bar">
        <button class="btn-csv" onclick="downloadCSV()">⬇ Download CSV</button>
        <button class="btn-outline" style="font-size:12.5px;padding:6px 14px;" onclick="clearAllData()">Reset all data</button>
      </div>
      <div class="backup-row">
        <span>💾 Backup your data</span>
        <button class="btn-outline" style="font-size:12px;padding:5px 12px;" onclick="doExportBackup()">Export JSON</button>
        <button class="btn-outline" style="font-size:12px;padding:5px 12px;" onclick="document.getElementById('backup-file-input').click()">Import JSON</button>
        <input type="file" id="backup-file-input" accept=".json" onchange="doImportBackup(event)" />
      </div>
      <div class="storage-bar" id="storage-bar">Storage used: —</div>
    </div>

    <div class="filter-bar">
      <input id="search-input" type="text" placeholder="🔍 Search items…" oninput="applyFilters()" style="flex:2;min-width:160px" />
      <select id="filter-cat" onchange="applyFilters()">
        <option value="">All categories</option>
        <option>Dairy</option><option>Vegetables</option><option>Grains</option>
        <option>Fruits</option><option>Snacks</option><option>Beverages</option><option>Other</option>
      </select>
      <select id="filter-status" onchange="applyFilters()">
        <option value="">All statuses</option>
        <option value="fresh">🟢 Fresh</option>
        <option value="expiring">🟡 Expiring</option>
        <option value="low">🔴 Low Stock</option>
      </select>
      <select id="sort-by" onchange="applyFilters()">
        <option value="date">Sort: Date added</option>
        <option value="name">Sort: Name A→Z</option>
        <option value="qty">Sort: Qty low→high</option>
      </select>
    </div>

    <div class="table-wrap">
      <table class="inventory-table">
        <thead>
          <tr><th>Item</th><th>Quantity</th><th>Category</th><th>Unit</th><th>Status</th><th></th></tr>
        </thead>
        <tbody id="inventory-body"></tbody>
      </table>
    </div>
  </div>

  <!-- EXPENSES TAB -->
  <div id="tab-expenses" class="tab-pane" style="display:none">
    <div class="summary-cards">
      <div class="summary-card"><div class="s-label">Total spent</div><div class="s-val" id="total-spent">₹0</div></div>
      <div class="summary-card"><div class="s-label">Per person</div><div class="s-val" id="per-person">₹0</div></div>
      <div class="summary-card"><div class="s-label">This week</div><div class="s-val" id="this-week">₹0</div></div>
    </div>
    <div class="exp-grid">
      <div class="add-form" style="margin-bottom:0">
        <div class="form-label">💳 Log expense</div>
        <div class="form-row">
          <input id="exp-name" type="text" placeholder="Item / description" />
          <input id="exp-amount" type="number" placeholder="Amount (₹)" min="1" style="max-width:130px" />
          <select id="exp-member-sel">
            <option>Raj</option><option>Gaurav</option><option>Priya</option><option>Other</option>
          </select>
          <button class="btn-primary" onclick="addExpense()">Add</button>
        </div>
      </div>
      <div class="add-form" style="margin-bottom:0">
        <div class="form-label">👥 Member breakdown</div>
        <div id="member-breakdown" style="font-size:13px;color:var(--text-secondary)">No expenses yet.</div>
      </div>
    </div>
    <div class="expense-list" id="expense-list"></div>
  </div>

  <!-- ALERTS TAB -->
  <div id="tab-alerts" class="tab-pane" style="display:none">
    <div class="alert-list" id="alert-list"></div>
  </div>

</main>

<script type="module">
  import { logout }                                          from './auth.js';
  import { getInventory, saveInventory,
           getExpenses,  saveExpenses,
           clearAll,     getStorageUsedKB }                  from './data.js';
  import { validateItem, validateExpense }                   from './validate.js';
  import { searchItems,      getByCategory,
           getLowStock,      getExpiringSoon,   getFreshItems,
           sortByName,       sortByQty,         sortByDateAdded,
           getInventorySummary, getMemberBreakdown,
           getTotalSpent,    getRecentExpenses }              from './filter.js';
  import { exportBackup, importBackup }                      from './backup.js';

  // auth guard
  const user = localStorage.getItem("user");
  if (!user) { window.location.href = "login.html"; }
  document.getElementById('dash-user-label').textContent = user;
  document.getElementById('user-initial').textContent    = (user||'?')[0].toUpperCase();

  const h = new Date().getHours();
  document.getElementById('dash-greeting').textContent =
    h < 12 ? 'Good morning 👋' : h < 17 ? 'Good afternoon 👋' : 'Good evening 👋';

  let inventory = getInventory();
  let expenses  = getExpenses();
  let nextId    = inventory.length ? Math.max(...inventory.map(i=>i.id))+1 : 1;
  let nextExpId = expenses.length  ? Math.max(...expenses.map(e=>e.id))+1  : 1;

  function updateStorageBar() {
    document.getElementById('storage-bar').textContent =
      `Storage used: ${getStorageUsedKB()} KB  (browser localStorage)`;
  }

  // ── INVENTORY ─────────────────────────────
  window.addItem = function () {
    const name   = document.getElementById('item-name').value.trim();
    const qty    = document.getElementById('item-qty').value;
    const cat    = document.getElementById('item-cat').value;
    const unit   = document.getElementById('item-unit').value;
    const status = document.getElementById('item-status').value;

    const check = validateItem(name, qty, inventory);
    if (!check.ok) return showToast(check.message, "error");

    inventory.push({ id:nextId++, name, qty:parseFloat(qty), cat, unit, status, addedAt:Date.now() });
    saveInventory(inventory);
    applyFilters(); renderAlerts(); updateStats(); updateStorageBar();
    document.getElementById('item-name').value='';
    document.getElementById('item-qty').value='1';
    showToast(`Added "${name}" ✓`);
  };

  window.removeItem = function (id) {
    const item = inventory.find(i=>i.id===id);
    inventory  = inventory.filter(i=>i.id!==id);
    saveInventory(inventory);
    applyFilters(); renderAlerts(); updateStats(); updateStorageBar();
    showToast(`Removed "${item?.name||'item'}"`, "warn");
  };

  window.updateStatus = function (id, val) {
    inventory = inventory.map(i => i.id===id ? {...i,status:val} : i);
    saveInventory(inventory);
    applyFilters(); renderAlerts(); updateStats();
  };

  window.applyFilters = function () {
    const query     = document.getElementById('search-input').value;
    const catF      = document.getElementById('filter-cat').value;
    const statusF   = document.getElementById('filter-status').value;
    const sortMode  = document.getElementById('sort-by').value;

    let result = [...inventory];
    result = searchItems(result, query);
    if (catF)              result = getByCategory(result, catF);
    if (statusF==='expiring') result = getExpiringSoon(result);
    else if (statusF==='low') result = getLowStock(result);
    else if (statusF==='fresh') result = getFreshItems(result);
    if (sortMode==='name') result = sortByName(result);
    else if (sortMode==='qty') result = sortByQty(result);
    else result = sortByDateAdded(result);
    renderInventory(result);
  };

  function renderInventory(items) {
    const el = document.getElementById('inventory-body');
    if (!el) return;
    if (!items||!items.length) {
      el.innerHTML=`<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📦</div>No items found.</div></td></tr>`;
      return;
    }
    el.innerHTML = items.map(i=>`
      <tr>
        <td style="font-weight:600">${esc(i.name)}</td>
        <td style="color:var(--text-secondary)">${i.qty} ${i.unit}</td>
        <td><span style="font-size:11.5px;font-weight:600;background:var(--bg-secondary);padding:3px 8px;border-radius:5px;color:var(--text-secondary)">${i.cat}</span></td>
        <td style="color:var(--text-tertiary);font-size:12.5px">${i.unit}</td>
        <td>
          <select onchange="updateStatus(${i.id},this.value)"
            style="border:none;background:transparent;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;outline:none;padding:2px 4px;">
            <option value="fresh"    ${i.status==='fresh'   ?'selected':''}>🟢 Fresh</option>
            <option value="expiring" ${i.status==='expiring'?'selected':''}>🟡 Expiring</option>
            <option value="low"      ${i.status==='low'     ?'selected':''}>🔴 Low Stock</option>
          </select>
        </td>
        <td><button class="btn-danger" onclick="removeItem(${i.id})">Remove</button></td>
      </tr>`).join('');
  }

  // ── EXPENSES ───────────────────────────────
  window.addExpense = function () {
    const name   = document.getElementById('exp-name').value.trim();
    const amount = document.getElementById('exp-amount').value;
    const member = document.getElementById('exp-member-sel').value;

    const check = validateExpense(name, amount);
    if (!check.ok) return showToast(check.message, "error");

    expenses.push({ id:nextExpId++, name, amount:parseFloat(amount), member, date:Date.now() });
    saveExpenses(expenses);
    renderExpenses(); updateStats(); updateStorageBar();
    document.getElementById('exp-name').value='';
    document.getElementById('exp-amount').value='';
    showToast(`Logged ₹${amount} for "${name}" ✓`);
  };

  window.removeExpense = function (id) {
    expenses = expenses.filter(e=>e.id!==id);
    saveExpenses(expenses);
    renderExpenses(); updateStats();
    showToast("Expense removed","warn");
  };

  function renderExpenses() {
    const el = document.getElementById('expense-list');
    if (!el) return;
    const total     = getTotalSpent(expenses);
    const members   = [...new Set(expenses.map(e=>e.member))].length||1;
    const weekTotal = getTotalSpent(getRecentExpenses(expenses,7));
    const breakdown = getMemberBreakdown(expenses);

    document.getElementById('total-spent').textContent='₹'+total.toLocaleString('en-IN');
    document.getElementById('per-person').textContent ='₹'+Math.round(total/members).toLocaleString('en-IN');
    document.getElementById('this-week').textContent  ='₹'+weekTotal.toLocaleString('en-IN');

    const bEl=document.getElementById('member-breakdown');
    if (bEl) {
      const entries=Object.entries(breakdown);
      bEl.innerHTML=!entries.length
        ?'<span style="color:var(--text-tertiary)">No expenses yet.</span>'
        :entries.map(([m,amt])=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;">
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;">${m[0]}</div>
              <span style="font-weight:500">${m}</span>
            </div>
            <span style="font-weight:700;color:var(--green)">₹${amt.toLocaleString('en-IN')}</span>
          </div>`).join('');
    }
    el.innerHTML=!expenses.length
      ?`<div class="empty-state"><div class="empty-icon">💸</div>No expenses logged yet.</div>`
      :[...expenses].reverse().map(e=>`
        <div class="expense-item">
          <div class="expense-left">
            <div class="expense-name">${esc(e.name)}</div>
            <div class="expense-meta">${e.member} · ${fmtDate(e.date)}</div>
          </div>
          <div class="expense-right">
            <div class="expense-amount">₹${e.amount.toLocaleString('en-IN')}</div>
            <button class="btn-danger" onclick="removeExpense(${e.id})">×</button>
          </div>
        </div>`).join('');
  }

  // ── ALERTS ─────────────────────────────────
  function renderAlerts() {
    const el=document.getElementById('alert-list');
    if (!el) return;
    const alerts=[
      ...getExpiringSoon(inventory).map(i=>({type:'red',  title:`⚠️ ${i.name} is expiring soon`,sub:`${i.qty} ${i.unit} · ${i.cat}`})),
      ...getLowStock(inventory).map(i=>    ({type:'amber',title:`📉 ${i.name} is running low`,  sub:`Only ${i.qty} ${i.unit} remaining`})),
      ...getFreshItems(inventory).map(i=>  ({type:'green',title:`✓ ${i.name} is fully stocked`, sub:`${i.qty} ${i.unit} · ${i.cat}`})),
    ];
    el.innerHTML=!alerts.length
      ?`<div class="empty-state"><div class="empty-icon">✅</div>No alerts — your inventory looks great!</div>`
      :alerts.map(a=>`
        <div class="alert-item alert-${a.type}">
          <div class="alert-dot alert-dot-${a.type}"></div>
          <div><div class="alert-title">${a.title}</div><div class="alert-sub">${a.sub}</div></div>
        </div>`).join('');
  }

  // ── STATS ──────────────────────────────────
  function updateStats() {
    const s=getInventorySummary(inventory);
    document.getElementById('stat-total').textContent    = s.total;
    document.getElementById('stat-expiring').textContent = s.expiring;
    document.getElementById('stat-low').textContent      = s.low;
    document.getElementById('stat-spend').textContent    = '₹'+getTotalSpent(expenses).toLocaleString('en-IN');
  }

  // ── TABS ───────────────────────────────────
  window.showTab = function(tab,btn) {
    ['inventory','expenses','alerts'].forEach(t=>
      document.getElementById('tab-'+t).style.display = t===tab?'block':'none');
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    if (tab==='alerts')   renderAlerts();
    if (tab==='expenses') renderExpenses();
  };

  // ── CSV ────────────────────────────────────
  window.downloadCSV = function () {
    if (!inventory.length) return showToast("No items to export","warn");
    const csv=[['Name','Quantity','Unit','Category','Status','Added On'],
      ...inventory.map(i=>[i.name,i.qty,i.unit,i.cat,i.status,fmtDate(i.addedAt)])
    ].map(r=>r.join(',')).join('\n');
    Object.assign(document.createElement('a'),{
      href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),
      download:'stock-sync-inventory.csv'
    }).click();
    showToast("CSV downloaded ✓");
  };

  // ── BACKUP ─────────────────────────────────
  window.doExportBackup = function() {
    const r=exportBackup();
    showToast(r.message);
  };

  window.doImportBackup = async function(event) {
    const file=event.target.files[0];
    if (!file) return;
    try {
      const r = await importBackup(file);
      inventory=getInventory(); expenses=getExpenses();
      applyFilters(); renderExpenses(); renderAlerts(); updateStats(); updateStorageBar();
      showToast(r.message);
    } catch(err) { showToast(err,"error"); }
    event.target.value='';
  };

  // ── CLEAR ──────────────────────────────────
  window.clearAllData = function() {
    if (!confirm("Reset all your data? This cannot be undone.")) return;
    clearAll(); inventory=[]; expenses=[]; nextId=1; nextExpId=1;
    applyFilters(); renderExpenses(); renderAlerts(); updateStats(); updateStorageBar();
    showToast("All data cleared","warn");
  };

  window.doLogout = async function() { await logout(); };

  // ── TOAST ──────────────────────────────────
  function showToast(msg,type='success') {
    let c=document.getElementById('_tc');
    if (!c){c=document.createElement('div');c.id='_tc';c.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;';document.body.appendChild(c);}
    const col={success:{bg:'#ecfdf5',border:'#86efac',text:'#065f46'},error:{bg:'#fef2f2',border:'#fca5a5',text:'#7f1d1d'},warn:{bg:'#fffbeb',border:'#fcd34d',text:'#78350f'}}[type]||{bg:'#ecfdf5',border:'#86efac',text:'#065f46'};
    const t=document.createElement('div');
    t.style.cssText=`background:${col.bg};border:1px solid ${col.border};color:${col.text};padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;font-family:'DM Sans',sans-serif;box-shadow:0 8px 24px rgba(0,0,0,0.12);max-width:290px;`;
    t.textContent=msg; c.appendChild(t);
    setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300);},2800);
  }

  function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
  function fmtDate(ts){return ts?new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):''}

  // init
  const openTab=sessionStorage.getItem('openTab');
  if (openTab){sessionStorage.removeItem('openTab');showTab(openTab,document.querySelector(`.tab-btn[onclick*="${openTab}"]`));}
  else { applyFilters(); }
  updateStats(); updateStorageBar();
</script>
</body>
</html>
